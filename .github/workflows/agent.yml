name: Nanobot Safe Agent

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

permissions:
  contents: write  # Needed if you add git push steps later

jobs:
  run-agent:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Nanobot
        run: pip install nanobot-ai

      # ✅ FIX 1: Removed extra spaces in Telegram API URL
      - name: Purge Webhook Conflicts
        run: |
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/deleteWebhook?drop_pending_updates=true"

      # ✅ FIX 2: Corrected indentation (was misaligned as sub-step)
      # ✅ FIX 3: Fixed ALLOW_FROM format for proper list parsing
      - name: Run Nanobot Gateway
        timeout-minutes: 340
        env:
          NANOBOT_PROVIDERS__GEMINI__API_KEY: ${{ secrets.GEMINI_API_KEY }}
          NANOBOT_AGENTS__DEFAULTS__MODEL: "gemini/gemini-3.1-flash-lite-preview"
          NANOBOT_CHANNELS__TELEGRAM__ENABLED: "true"
          NANOBOT_CHANNELS__TELEGRAM__TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          # ✅ FIX: Escaped quotes for valid JSON array string
          NANOBOT_CHANNELS__TELEGRAM__ALLOW_FROM: "[\"${{ secrets.TELEGRAM_USER_ID }}\"]"
          # Redundant keys for safety
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GOOGLE_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: nanobot gateway
